<!DOCTYPE html>
<html>
<head>
<title>Friend Chat</title>
<style>
body { font-family: Arial; background:#f4f4f4; margin:0; }
#container { display:flex; height:100vh; }
#sidebar { width:200px; background:#333; color:white; padding:10px; box-sizing:border-box; overflow-y:auto;}
.room { padding:8px; margin:5px 0; background:#444; cursor:pointer; border-radius:5px; }
.room:hover { background:#555; }
.static-room { padding:8px; margin:5px 0; background:#555; border-radius:5px; color:#ccc; cursor:default; }
#chat-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:10px; box-sizing:border-box; }
#messages { width:100%; height:60%; background:white; border:1px solid #ccc; overflow-y:scroll; padding:10px; text-align:left; }
.message { margin:5px 0; padding:5px 10px; border-radius:10px; max-width:80%; display:flex; align-items:center; }
.message img { width:30px; height:30px; border-radius:50%; margin-right:8px; }
.system { color:gray; font-style:italic; text-align:center; }
.user-msg { background:#e0e0e0; margin-left:auto; text-align:right; }
.other-msg { background:#d0f0ff; }
.time { color:#888; font-size:11px; margin-left:5px; }
#input { width:70%; padding:10px; margin-top:10px; }
button { padding:10px; margin-left:5px; }
#typing { font-style: italic; color: gray; height:20px; margin-top:5px; }
</style>
</head>
<body>

<div id="container">

  <div id="sidebar">
    <h3>Rooms</h3>
    <div class="room" onclick="switchRoom('General')">General</div>
    <div class="room" onclick="switchRoom('Gaming')">Gaming</div>
    <div class="room" onclick="switchRoom('Music')">Music</div>
    <div class="room" onclick="switchRoom('Coding')">Coding</div>
    <br>
    <button onclick="createRoom()">Create Room</button>
    <br><br>
    <button onclick="resetStorage()">Reset All Messages (Owner)</button>
    <h4>Upcoming Features</h4>
    <div class="static-room">User profiles & avatars</div>
    <div class="static-room">Image messages</div>
    <div class="static-room">Spotify music parties</div>
    <div class="static-room">Online user list per room</div>
    <div class="static-room">Other fun features coming soon</div>
  </div>

  <div id="chat-area">
    <h2 id="room-name">Room: General</h2>
    <div id="messages"></div>
    <div id="typing"></div>
    <div>
      <input id="input" placeholder="Type message">
      <button onclick="send()">Send</button>
      <input type="file" id="imageInput" accept="image/*">
      <button onclick="sendImage()">Send Image</button>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// Load profile from localStorage
let profile = JSON.parse(localStorage.getItem("chatProfile"));
if(!profile){
    const username = prompt("Enter your name") || "Anonymous";
    const avatar = prompt("Enter avatar image URL (optional)") || "";
    profile = { username, avatar };
    localStorage.setItem("chatProfile", JSON.stringify(profile));
}
let username = profile.username;
let avatar = profile.avatar;

let room = "General";
const rooms = {};

function joinRoom(roomName){
    socket.emit("join", {username, room: roomName, avatar});
}

joinRoom(room);

const messages = document.getElementById("messages");
const input = document.getElementById("input");
const typingDiv = document.getElementById("typing");
const roomHeader = document.getElementById("room-name");
let typingTimeout;

function addMessage(data){
    const div = document.createElement("div");
    if(data.user){
        if(data.image){
            div.innerHTML = `<div class="message ${data.user===username?'user-msg':'other-msg'}">
                <img src="${data.avatar||'https://via.placeholder.com/30'}">
                <strong>${data.user}</strong>: <br>
                <img src="${data.image}" style="max-width:200px; max-height:200px; margin-top:5px;">
                <span class="time">${data.time}</span>
            </div>`;
        } else {
            div.innerHTML = `<div class="message ${data.user===username?'user-msg':'other-msg'}">
                <img src="${data.avatar||'https://via.placeholder.com/30'}">
                <strong>${data.user}</strong>: ${data.text} <span class="time">${data.time}</span>
            </div>`;
        }
    } else {
        div.innerHTML = `<div class="system">${data}</div>`;
    }
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function send(){
    if(input.value.trim()==="") return;
    socket.emit("chat message", input.value);
    input.value = "";
}

function sendImage(){
    const file = document.getElementById("imageInput").files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e => socket.emit("image message", { data: e.target.result });
    reader.readAsDataURL(file);
}

input.addEventListener("keypress", e => {
    if(e.key==="Enter") send();
    socket.emit("typing");
});

socket.on("typing", name => {
    typingDiv.textContent = `${name} is typing...`;
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(()=>typingDiv.textContent="",1000);
});

socket.on("chat message", addMessage);
socket.on("system message", msg => addMessage(msg));

function createRoom(){
    const name = prompt("Enter room name");
    if(!name) return;
    const password = prompt("Enter password (leave blank for public)");
    const isPublic = confirm("Make this room public? (Cancel = private)");
    socket.emit("create room", {name, password, isPublic});
    if(isPublic) addRoomToSidebar(name);
}

socket.on("new public room", name => addRoomToSidebar(name));

function addRoomToSidebar(name){
    const div = document.createElement("div");
    div.className = "room";
    div.textContent = name;
    div.onclick = ()=>switchRoom(name);
    document.getElementById("sidebar").appendChild(div);
}

function switchRoom(newRoom){
    const roomData = rooms[newRoom] || {};
    if(roomData.password){
        const entered = prompt("Enter password for "+newRoom);
        if(entered!==roomData.password){ alert("Wrong password!"); return; }
    }
    room = newRoom;
    roomHeader.textContent = "Room: "+room;
    messages.innerHTML = "";
    joinRoom(room);
}

function resetStorage(){
    const key = prompt("Enter owner key to reset messages");
    socket.emit("reset storage", key);
}
</script>

</body>
</html>
