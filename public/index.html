<!DOCTYPE html>
<html>
<head>
<title>Friend Chat</title>
<style>
body { font-family: Arial; background:#f4f4f4; text-align:center; }
#messages { width:500px; height:400px; margin:auto; background:white; border:1px solid #ccc; overflow-y:scroll; padding:10px; text-align:left; }
.message { margin:5px 0; padding:5px 10px; border-radius:10px; max-width:80%; }
.system { color:gray; font-style:italic; text-align:center; }
.user-msg { background:#e0e0e0; margin-left:auto; text-align:right; }
.other-msg { background:#d0f0ff; }
.time { color:#888; font-size:11px; margin-left:5px; }
#input { width:300px; padding:10px; }
button { padding:10px; }
#typing { font-style: italic; color: gray; height:20px; }
</style>
</head>
<body>

<h2>Friend Chat</h2>
<div id="messages"></div>
<div id="typing"></div>
<br>
<input id="input" placeholder="Type message">
<button onclick="send()">Send</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// Ask for username and room
let username = prompt("Enter your name") || "Anonymous";
let room = prompt("Enter room name") || "General";

socket.emit("join", {username, room});

const messages = document.getElementById("messages");
const input = document.getElementById("input");
const typingDiv = document.getElementById("typing");

let typingTimeout;

// Add message to chat
function addMessage(html) {
  const div = document.createElement("div");
  div.innerHTML = html;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

// Send message
function send() {
  if(input.value.trim() === "") return;
  socket.emit("chat message", input.value);
  input.value = "";
}

// Detect typing
input.addEventListener("keypress", function(e){
  if(e.key === "Enter") send();
  socket.emit("typing");
});

// Show typing indicator
socket.on("typing", function(name){
  typingDiv.textContent = `${name} is typing...`;
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(()=> typingDiv.textContent="", 1000);
});

// Show chat messages
socket.on("chat message", function(data){
  const cls = (data.user === username) ? "message user-msg" : "message other-msg";
  addMessage(`<div class="${cls}" style="border-left:5px solid ${data.color}"><strong>${data.user}</strong>: ${data.text} <span class="time">${data.time}</span></div>`);
});

// System messages
socket.on("system message", function(msg){
  addMessage(`<div class="system">${msg}</div>`);
});
</script>

</body>
</html>
